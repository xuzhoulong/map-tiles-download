# ──────────────────────────────────────────────
# GitHub Actions 工作流：自动部署 Vite 项目到 GitHub Pages
# 技术栈：Vite + Vue + pnpm
# ──────────────────────────────────────────────
name: 部署到 GitHub Pages

# ── 触发条件 ──────────────────────────────────
on:
  # 推送到 main 或 master 分支时自动触发
  push:
    branches:
      - main
      - master

  # 支持从 GitHub Actions 页面手动触发
  workflow_dispatch:

# ── 全局权限配置（GITHUB_TOKEN） ──────────────
permissions:
  contents: read      # 检出代码
  pages: write        # 部署 Pages
  id-token: write     # OIDC 身份验证，用于 Pages 部署鉴权

# ── 并发控制：同一分组只保留最新运行，自动取消旧运行 ──
concurrency:
  group: "pages"
  cancel-in-progress: true

# ═══════════════════════════════════════════════
#  Job 1: 构建
# ═══════════════════════════════════════════════
jobs:
  build:
    runs-on: ubuntu-latest
    name: 🔨 构建项目
    steps:
      # 1. 检出仓库代码
      - name: 📥 检出代码
        uses: actions/checkout@v4

      # 2. 安装 pnpm 包管理器
      - name: 📦 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      # 3. 设置 Node.js 环境（版本与本地一致，同时启用 pnpm 缓存）
      - name: 🟢 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.16.0'
          cache: 'pnpm'   # 自动缓存 pnpm 依赖，大幅加速后续构建

      # 4. 安装项目依赖
      - name: ⬇️ 安装依赖
        run: pnpm install --frozen-lockfile

      # 5. 执行构建（产出 dist 目录）
      - name: 🏗️ 构建项目
        run: pnpm build

      # 6. 将构建产物上传为 Pages Artifact
      - name: 📤 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist   # Vite 默认输出目录

  # ═══════════════════════════════════════════════
  #  Job 2: 部署
  # ═══════════════════════════════════════════════
  deploy:
    # 依赖构建完成且为 main/master 分支
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    runs-on: ubuntu-latest
    name: 🚀 部署到 GitHub Pages

    # GitHub Pages 部署环境（提供部署 URL）
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 将构建产物部署到 GitHub Pages
      - name: 🌐 部署
        id: deployment
        uses: actions/deploy-pages@v4
